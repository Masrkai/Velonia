# ==========================================
# 1. CHANGE PREFIX TO CTRL+A (Easier to reach)
# ==========================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ==========================================
# 2. SANE SPLIT COMMANDS
# ==========================================
# Use | and - to split panes intuitively
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ==========================================
# 3. MOUSE SUPPORT
# ==========================================
# Allows you to click panes, scroll, and resize panes with your mouse
set -g mouse on

# ==========================================
# 4. APPEARANCE & BEHAVIOR
# ==========================================
# Start window numbers at 1 instead of 0 (1 is next to ` on the keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Increase history limit
set -g history-limit 10000

# Reduce escape time (fixes delay in vim/neovim)
set -sg escape-time 0

# ==========================================
# 5. EASY RELOADING OF CONFIG
# ==========================================
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# ==========================================
# 6. VI-STYLE PANE NAVIGATION
# ==========================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# ==========================================
# 7. VIM COMPATIBLE COPY MODE
# ==========================================

# Enable vi-style keys in copy mode (allows h,j,k,l to scroll, etc.)
setw -g mode-keys vi

# Make 'v' enter visual selection (just like Vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Make 'y' yank (copy) the selection (just like Vim)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Make 'Escape' exit copy mode (just like exiting Vim)
bind-key -T copy-mode-vi Escape send-keys -X cancel